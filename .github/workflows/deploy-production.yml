name: Deploy Production

on:
  push:
    branches:
      - main
      - codex/develop
    paths-ignore:
      - "**/*.md"
      - "artifacts/**"
      - "docs/**"
      - "admin/**"
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy
        required: false
        default: codex/develop

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Resolve deploy branch
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.branch }}" ]; then
            echo "branch=${{ inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ steps.deploy.outputs.branch }}
          DEPLOY_GITHUB_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: 22
          command_timeout: 40m
          envs: DEPLOY_PATH,DEPLOY_BRANCH,DEPLOY_GITHUB_TOKEN
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${DEPLOY_PATH:-/opt/seo/kyenai}"
            export DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              mkdir -p "$(dirname "$DEPLOY_PATH")"
              git clone --branch "$DEPLOY_BRANCH" \
                "https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
                "$DEPLOY_PATH"
            fi
            bash "$DEPLOY_PATH/scripts/deploy-on-server.sh"
