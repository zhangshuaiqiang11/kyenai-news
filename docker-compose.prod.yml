services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.kyenai.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.kyenai.com}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_EDITORIAL_EMAIL: ${NEXT_PUBLIC_EDITORIAL_EMAIL:-}
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.kyenai.com}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.kyenai.com}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
      NEXT_PUBLIC_EDITORIAL_EMAIL: ${NEXT_PUBLIC_EDITORIAL_EMAIL:-}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://geo:${POSTGRES_PASSWORD:-change-me}@postgres:5432/geo_portal}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://www.kyenai.com,https://api.kyenai.com,http://localhost:3000,http://127.0.0.1:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      GOOGLE_OAUTH_REFRESH_TOKEN: ${GOOGLE_OAUTH_REFRESH_TOKEN:-}
      GSC_SITE_URL: ${GSC_SITE_URL:-https://www.kyenai.com/}
      GA4_PROPERTY_ID: ${GA4_PROPERTY_ID:-}
      BING_WEBMASTER_API_KEY: ${BING_WEBMASTER_API_KEY:-}
      BING_SITE_URL: ${BING_SITE_URL:-https://www.kyenai.com}
      INDEXNOW_KEY: ${INDEXNOW_KEY:-}
      INDEXNOW_HOST: ${INDEXNOW_HOST:-www.kyenai.com}
      PAGESPEED_API_KEY: ${PAGESPEED_API_KEY:-}
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST_PATH:-/opt/seo/secrets/google-application-credentials.json}:${GOOGLE_APPLICATION_CREDENTIALS:-/run/secrets/google-application-credentials.json}:ro
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-geo_portal}
    volumes:
      - prod_postgres:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - prod_redis:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:-www.kyenai.com}
      APEX_DOMAIN: ${APEX_DOMAIN:-kyenai.com}
      API_DOMAIN: ${API_DOMAIN:-api.kyenai.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  prod_postgres:
  prod_redis:
  caddy_data:
  caddy_config:
